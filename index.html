<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0c0e14;
      --surface:     #141720;
      --border:      #1e2433;
      --text:        #e8eaf0;
      --muted:       #4e566e;
      --accent-a:    #3d7fff;
      --accent-b:    #7c5cfc;
      --danger-a:    #ff3f3f;
      --danger-b:    #ff8c00;
      --bar-h:       52px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Setup ──────────────────────────────────────────── */

    #setup {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(61,127,255,.07) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 60%, rgba(124,92,252,.07) 0%, transparent 55%),
        var(--bg);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 48px;
      width: 100%;
      max-width: 420px;
      animation: fadeUp .45s ease both;
    }

    .card h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }

    .card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 36px;
    }

    .field { margin-bottom: 22px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input[type="time"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 24px;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s;
      color-scheme: dark;
    }

    .field input[type="time"]:focus {
      border-color: var(--accent-a);
    }

    .btn {
      width: 100%;
      margin-top: 4px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: .5px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .btn:hover  { opacity: .9; }
    .btn:active { transform: scale(.98); }

    /* ── Clock ──────────────────────────────────────────── */

    #clock-view {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding-bottom: calc(var(--bar-h) + 32px);
      background:
        radial-gradient(ellipse at 50% 35%, rgba(61,127,255,.04) 0%, transparent 60%),
        var(--bg);
    }

    #current-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(96px, 22vw, 280px);
      line-height: .88;
      letter-spacing: 4px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      animation: fadeUp .5s ease both;
    }

    #chips {
      display: flex;
      gap: 36px;
      margin-top: 22px;
      animation: fadeUp .5s .1s ease both;
    }

    .chip { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    .chip .lbl {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chip .val {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      color: var(--text);
    }

    #status {
      margin-top: 22px;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      color: var(--muted);
      min-height: 24px;
      animation: fadeUp .5s .15s ease both;
    }

    #finished {
      display: none;
      margin-top: 18px;
      padding: 10px 28px;
      border: 1px solid var(--danger-a);
      border-radius: 6px;
      color: var(--danger-a);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      animation: fadeUp .4s ease both, blink 2.2s .5s ease-in-out infinite;
    }

    /* ── Progress bar ───────────────────────────────────── */

    #bar-track {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      height: var(--bar-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    #bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
      transition: width .95s cubic-bezier(.4, 0, .2, 1);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 18px;
      position: relative;
      overflow: hidden;
    }

    #bar-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0;
      width: 60px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.09));
      pointer-events: none;
    }

    #bar-fill.overtime {
      background: linear-gradient(90deg, var(--danger-a), var(--danger-b));
      width: 100% !important;
      transition: background .6s ease;
    }

    #bar-text {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: rgba(255,255,255,.75);
      white-space: nowrap;
      position: relative;
      z-index: 1;
    }

    /* ── Animations ─────────────────────────────────────── */

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .45; border-color: transparent; }
    }
  </style>
</head>
<body>

<!-- ── Setup screen ──────────────────────────────────────── -->
<div id="setup">
  <div class="card">
    <h1>Exam Clock</h1>
    <p>Set the exam window. The clock will track progress and alert when time is up.</p>

    <div class="field">
      <label>Start time</label>
      <input type="time" id="start-input" />
    </div>
    <div class="field">
      <label>End time</label>
      <input type="time" id="end-input" />
    </div>

    <button class="btn" onclick="launch()">Start Exam Clock →</button>
  </div>
</div>

<!-- ── Clock screen ──────────────────────────────────────── -->
<div id="clock-view">
  <div id="current-time">00:00:00</div>

  <div id="chips">
    <div class="chip">
      <span class="lbl">Start</span>
      <span class="val" id="chip-start">--:--</span>
    </div>
    <div class="chip">
      <span class="lbl">End</span>
      <span class="val" id="chip-end">--:--</span>
    </div>
  </div>

  <div id="status"></div>
  <div id="finished">Exam Finished</div>
</div>

<!-- ── Progress bar ──────────────────────────────────────── -->
<div id="bar-track">
  <div id="bar-fill">
    <span id="bar-text"></span>
  </div>
</div>

<script>
  // ── Helpers ────────────────────────────────────────────────
  function pad(n) { return String(n).padStart(2, '0'); }

  function fmtDuration(totalSecs) {
    const h = Math.floor(totalSecs / 3600);
    const m = Math.floor((totalSecs % 3600) / 60);
    const s = totalSecs % 60;
    return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
  }

  function parseHHMM(str) {
    const [h, m] = str.split(':').map(Number);
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return d;
  }

  // ── Setup form ─────────────────────────────────────────────
  function launch() {
    const s = document.getElementById('start-input').value;
    const e = document.getElementById('end-input').value;
    if (!s || !e)  { alert('Please enter both start and end times.'); return; }
    if (s >= e)    { alert('End time must be after start time.'); return; }
    window.location.search = `?start=${encodeURIComponent(s)}&end=${encodeURIComponent(e)}`;
  }

  document.getElementById('start-input').addEventListener('keydown', ev => {
    if (ev.key === 'Enter') document.getElementById('end-input').focus();
  });
  document.getElementById('end-input').addEventListener('keydown', ev => {
    if (ev.key === 'Enter') launch();
  });

  // ── Clock ──────────────────────────────────────────────────
  const params   = new URLSearchParams(window.location.search);
  const sp       = params.get('start');
  const ep       = params.get('end');

  if (sp && ep) {
    document.getElementById('setup').style.display     = 'none';
    document.getElementById('clock-view').style.display = 'flex';

    const startDate = parseHHMM(sp);
    const endDate   = parseHHMM(ep);
    const total     = endDate - startDate;

    document.getElementById('chip-start').textContent = sp;
    document.getElementById('chip-end').textContent   = ep;

    const elTime     = document.getElementById('current-time');
    const elStatus   = document.getElementById('status');
    const elFinished = document.getElementById('finished');
    const elFill     = document.getElementById('bar-fill');
    const elBarText  = document.getElementById('bar-text');

    let wasOvertime = false;

    function tick() {
      const now = new Date();

      // Big clock display
      elTime.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

      if (now < startDate) {
        // Not started yet
        const secs = Math.ceil((startDate - now) / 1000);
        elStatus.textContent = `Starts in ${fmtDuration(secs)}`;
        elFill.style.width = '0%';
        elBarText.textContent = '';
        elFill.classList.remove('overtime');

      } else if (now <= endDate) {
        // In progress
        const elapsed    = now - startDate;
        const pct        = Math.min((elapsed / total) * 100, 100);
        const remaining  = Math.max(0, Math.ceil((endDate - now) / 1000));
        elStatus.textContent = `${fmtDuration(remaining)} remaining`;
        elFill.style.width = pct + '%';
        elBarText.textContent = '';
        elFill.classList.remove('overtime');

      } else {
        // Overtime
        const overSecs = Math.floor((now - endDate) / 1000);
        elStatus.textContent = '';
        if (!wasOvertime) {
          elFinished.style.display = 'block';
          elFill.classList.add('overtime');
          wasOvertime = true;
        }
        elBarText.textContent = `+${fmtDuration(overSecs)} overtime`;
      }
    }

    tick();
    setInterval(tick, 1000);
  }
</script>
</body>
</html>
